<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civ-Op System - Demo Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .demo-links {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .demo-link {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .demo-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .demo-link.secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .demo-link.secondary:hover {
            background: #e0e0e0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏛️ Civ-Op System</h1>
        <p class="subtitle">Civic Operations Platform</p>
        
        <div class="demo-links">
            <a href="Google%20AI%20Studio.html" class="demo-link">
                🤖 Google AI Studio Demo
            </a>
            <a href="bscframe.html" class="demo-link">
                📱 BSC Frame Demo
            </a>
        </div>
        
        <div class="badge">✨ Live Demo Available</div>
        
        <div class="footer">
            <p>
                <strong>Civ-Op System</strong> - Streamline civic engagement and operations<br>
                <a href="https://github.com/thadcornett94-glitch/Peoples-Law-CIVOP" style="color: #667eea; text-decoration: none;">View on GitHub</a> | 
                <a href="https://peoples-law-civop.vercel.app" style="color: #667eea; text-decoration: none;">Live Production</a>
            </p>
        </div>
    </div>
</body>
</html>
